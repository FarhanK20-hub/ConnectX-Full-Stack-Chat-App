name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: '**/package.json'
      
      - name: Install Dependencies
        run: |
          cd server && npm ci
          cd ../client && npm ci
          
      - name: Lint Server
        run: cd server && npm run lint
        
      - name: Lint Client
        run: cd client && npm run lint

  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
    env:
      MONGODB_URI: mongodb://localhost:27017/connectx_test
      JWT_ACCESS_SECRET: test_access_secret
      JWT_REFRESH_SECRET: test_refresh_secret
      VAULT_JWT_SECRET: test_vault_secret
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'server/package.json'
          
      - name: Install Server Dependencies
        run: cd server && npm ci
        
      - name: Run Server Tests with Coverage
        run: cd server && npm run test:coverage

  test-client:
    name: Client Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'client/package.json'
          
      - name: Install Client Dependencies
        run: cd client && npm ci
        
      - name: Run Client Tests with Coverage
        run: cd client && npm run test:coverage

  test-e2e:
    name: E2E Tests (Playwright)
    needs: [test-server, test-client]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install Root Dependencies (Playwright)
        run: npm ci
        
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        
      - name: Start Application via Docker Compose
        run: docker-compose up --build -d
        
      - name: Wait for services to be ready
        run: sleep 30 # Adjust based on startup time
        
      - name: Run Playwright tests
        run: npx playwright test
        
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Server Security Audit
        run: cd server && npm audit --audit-level=high
        
      - name: Client Security Audit
        run: cd client && npm audit --audit-level=high
